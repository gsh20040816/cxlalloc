[workspace]
members = ["cxlalloc", "cxlalloc-bench", "cxlalloc-dynamic", "cxlalloc-extend"]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0"
arrayvec = "0.7"
atomic_refcell = "0.1"
clap = { version = "4.5", features = ["derive"] }
ctor = "0.2"
duct = "0.13"
env_logger = "0.11"
hdrhistogram = "7.5"
homedir = "0.3"
libc = "0.2"
log = { version = "0.4", features = ["release_max_level_off"] }
mimalloc = "0.1"
# log = { version = "0.4" }
# rand = "0.8"

[profile.release]
codegen-units = 1
debug = true
lto = "fat"
panic = "abort"
