[package]
name = "cxlalloc"
version = "0.1.0"
edition = "2021"

[features]
backend-shm = ["numa-sys"]
extend = []
stat-count = []
stat-extend = []
stat-size = ["dep:hdrhistogram"]
validate = []

[dependencies]
arrayvec.workspace = true
atomic_refcell.workspace = true
hdrhistogram = { workspace = true, optional = true }
libc.workspace = true
log.workspace = true

[dependencies.numa-sys]
git = "https://github.com/nwtnni/numa.git"
optional = true
features = ["dynamic"]

[dev-dependencies]
env_logger.workspace = true
